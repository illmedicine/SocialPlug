#cloud-config
# ══════════════════════════════════════════════════════════════════════════════
# SocialPlug VM Agent v2 — Cloud-Init (runs on first boot)
# by Illy Robotic Instruments
#
# Installs a REAL Chrome / Chromium browser on a virtual display (Xvfb).
# Tabs managed via Chrome DevTools Protocol. Optional noVNC for live access.
# ══════════════════════════════════════════════════════════════════════════════

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - python3-venv
  - git
  - xvfb
  - x11vnc
  - novnc
  - websockify
  - xdotool
  - chromium-browser
  - fonts-liberation
  - fonts-noto-color-emoji
  - libnss3
  - libatk1.0-0
  - libatk-bridge2.0-0
  - libcups2
  - libdrm2
  - libxkbcommon0
  - libxcomposite1
  - libxdamage1
  - libxrandr2
  - libgbm1
  - libpango-1.0-0
  - libcairo2
  - libasound2
  - libxshmfence1
  - xdg-utils
  - wget
  - curl
  - ca-certificates

write_files:
  - path: /etc/systemd/system/socialplug-agent.service
    content: |
      [Unit]
      Description=SocialPlug VM Agent v2 — by Illy Robotic Instruments
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=ubuntu
      WorkingDirectory=/home/ubuntu/socialplug-agent
      ExecStart=/home/ubuntu/socialplug-agent/venv/bin/python agent.py --vm-id ${vm_id} --vnc
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

  - path: /home/ubuntu/socialplug-agent/firebase-credentials.json.b64
    owner: ubuntu:ubuntu
    permissions: '0600'
    encoding: text/plain
    content: |
      ${firebase_credentials}

runcmd:
  # Decode Firebase credentials from base64
  - |
    sudo -u ubuntu bash -c '
      mkdir -p /home/ubuntu/socialplug-agent
      base64 -d /home/ubuntu/socialplug-agent/firebase-credentials.json.b64 \
        > /home/ubuntu/socialplug-agent/firebase-credentials.json
      chmod 600 /home/ubuntu/socialplug-agent/firebase-credentials.json
      rm -f /home/ubuntu/socialplug-agent/firebase-credentials.json.b64
    '

  - |
    sudo -u ubuntu bash -c '
      set -e
      cd /home/ubuntu

      # Clone repo
      git clone https://github.com/illmedicine/SocialPlug.git || true

      # Set up agent directory
      mkdir -p socialplug-agent
      cp SocialPlug/vm-agent/agent.py socialplug-agent/
      cp SocialPlug/vm-agent/requirements.txt socialplug-agent/
      cd socialplug-agent

      # Python venv + deps
      python3 -m venv venv
      source venv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt
    '

  # Enable and start the agent service
  - systemctl daemon-reload
  - systemctl enable socialplug-agent
  - systemctl start socialplug-agent

  # Idle-prevention cron (keeps CPU > 20% to avoid Oracle reclamation)
  - |
    echo '*/10 * * * * dd if=/dev/urandom bs=512K count=20 of=/dev/null 2>/dev/null' | crontab -u ubuntu -

final_message: "SocialPlug agent v2 (real Chrome) is running on ${vm_id}!"
