#cloud-config
# ══════════════════════════════════════════════════════════════════════════════
# SocialPlug VM Agent v2 — Cloud-Init for Azure VMs
# by Illy Robotic Instruments
#
# Installs a REAL Chrome / Chromium browser on a virtual display (Xvfb).
# Tabs managed via Chrome DevTools Protocol. Optional noVNC for live access.
# ══════════════════════════════════════════════════════════════════════════════

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - python3-venv
  - git
  - xvfb
  - x11vnc
  - novnc
  - websockify
  - xdotool
  - fonts-liberation
  - fonts-noto-color-emoji
  - libnss3
  - libatk1.0-0
  - libatk-bridge2.0-0
  - libcups2
  - libdrm2
  - libxkbcommon0
  - libxcomposite1
  - libxdamage1
  - libxrandr2
  - libgbm1
  - libpango-1.0-0
  - libcairo2
  - libasound2
  - libxshmfence1
  - xdg-utils
  - wget
  - curl
  - ca-certificates

write_files:
  - path: /etc/systemd/system/socialplug-agent.service
    content: |
      [Unit]
      Description=SocialPlug VM Agent v2 — by Illy Robotic Instruments
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=azureuser
      WorkingDirectory=/home/azureuser/socialplug-agent
      ExecStart=/home/azureuser/socialplug-agent/venv/bin/python agent.py --vm-id ${vm_id} --vnc
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

  - path: /home/azureuser/socialplug-agent/firebase-credentials.json.b64
    owner: azureuser:azureuser
    permissions: '0600'
    encoding: text/plain
    content: |
      ${firebase_credentials}

runcmd:
  # Decode Firebase credentials from base64
  - |
    sudo -u azureuser bash -c '
      mkdir -p /home/azureuser/socialplug-agent
      base64 -d /home/azureuser/socialplug-agent/firebase-credentials.json.b64 \
        > /home/azureuser/socialplug-agent/firebase-credentials.json
      chmod 600 /home/azureuser/socialplug-agent/firebase-credentials.json
      rm -f /home/azureuser/socialplug-agent/firebase-credentials.json.b64
    '

  - |
    sudo -u azureuser bash -c '
      set -e
      cd /home/azureuser

      git clone https://github.com/illmedicine/SocialPlug.git || true

      mkdir -p socialplug-agent
      cp SocialPlug/vm-agent/agent.py socialplug-agent/
      cp SocialPlug/vm-agent/requirements.txt socialplug-agent/
      cd socialplug-agent

      python3 -m venv venv
      source venv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt
    '

  # Install Chrome on x86 VMs, Chromium on ARM64 — runs after apt packages
  - |
    ARCH=$(dpkg --print-architecture)
    if [ "$ARCH" = "amd64" ]; then
      wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
      dpkg -i /tmp/chrome.deb || apt-get install -f -y
      rm -f /tmp/chrome.deb
    else
      apt-get install -y chromium-browser || snap install chromium
    fi

  - systemctl daemon-reload
  - systemctl enable socialplug-agent
  - systemctl start socialplug-agent

final_message: "SocialPlug agent v2 (real Chrome) is running on ${vm_id}!"
